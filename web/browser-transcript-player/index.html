<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveDeck — Live Listenbury Session</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css"
      integrity="sha384-N/4l0y8PNlO5uZuzP9PK3bAgJQ8ZChybZFXB2mpkZRUil/bui++mvYXPzPAHpbr6"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="top-chrome">
      <div class="brand">
        <p class="eyebrow">Listenbury live session</p>
        <h1>WaveDeck — Live Listenbury Session</h1>
        <p class="subtitle" id="header-subtitle">
          Live event timeline for listenbury listen --web.
        </p>
      </div>

      <div id="chrome-shell-root"></div>
      <audio id="audio" controls preload="metadata"></audio>
    </header>

    <div id="transcript-shell-root"></div>

    <main class="workspace">
      <section class="viewer-stage">
        <section id="viewer" class="viewer empty">
          <p>Waiting for live events…</p>
        </section>
      </section>

      <aside class="inspector">
        <div id="inspector-shell-root"></div>
      </aside>
    </main>

    <script
      src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"
      integrity="sha384-MLX+7yEEPNEznaIWwQi2pBMODSBP6Qo6BOVpzjFWB0UkfEzEYsvHOo7ISLfcQeiI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
