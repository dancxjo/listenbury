name: Rescan

on:
  push:
  pull_request:

jobs:
  rescan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build setup
        run: just setup

      - name: Rescan
        env:
          LISTENBURY_SHORT: "1"
        run: just rescan
