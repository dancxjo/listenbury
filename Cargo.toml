[package]
name = "listenbury"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
crossbeam-channel = "0.5"
rtrb = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }

[features]
default = []
audio-cpal = ["dep:cpal"]
resample-rubato = ["dep:rubato"]
vad-silero = []
vad-webrtc = []
llm-llama-cpp = []
asr-whisper = []
tts-piper = []
vision-webcam = []

[dependencies.cpal]
version = "0.15"
optional = true

[dependencies.rubato]
version = "0.16"
optional = true
